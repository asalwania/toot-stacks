<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4F46E5"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
    <linearGradient id="boltGrad" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#FBBF24"/>
      <stop offset="100%" stop-color="#F59E0B"/>
    </linearGradient>
    <filter id="boltShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="#000000" flood-opacity="0.3"/>
    </filter>
    <filter id="layerShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000000" flood-opacity="0.15"/>
    </filter>
  </defs>
  <!-- Rounded square background -->
  <rect width="512" height="512" rx="112" fill="url(#bgGrad)"/>
  <!-- Stacked layers — solid whites with increasing opacity for depth -->
  <rect x="106" y="320" width="300" height="52" rx="14" fill="#FFFFFF" opacity="0.55" filter="url(#layerShadow)"/>
  <rect x="126" y="260" width="260" height="52" rx="14" fill="#FFFFFF" opacity="0.75" filter="url(#layerShadow)"/>
  <rect x="146" y="200" width="220" height="52" rx="14" fill="#FFFFFF" opacity="0.95" filter="url(#layerShadow)"/>
  <!-- Lightning bolt — amber/yellow for strong contrast -->
  <path d="M285 72 L232 240 L280 240 L228 440 L348 208 L296 208 L340 72 Z" fill="url(#boltGrad)" filter="url(#boltShadow)"/>
</svg>
